<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads</title>
  <link rel="icon" href="images/dl.ico" type="image/x-icon">
  <style> 
    body {
      font-family: 'Arial', sans-serif;
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .video-container {
      margin-bottom: 20px; /* Add margin between video and buttons */
    }

    .download-menu {
      text-align: center;
    }

    .download-button {
      display: inline-block;
      padding: 15px 30px;
      font-size: 18px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(45deg, #00f2fe, #4facfe);
      border: 2px solid #00f2fe;
      border-radius: 5px;
      transition: 0.3s;
      margin: 10px;
    }

    .download-button:hover {
      background: linear-gradient(45deg, #4facfe, #00f2fe);
    }

    @media only screen and (max-width: 600px) {
      .download-button {
        padding: 10px 20px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

<div class="video-container">
  <iframe width="530" height="300" src="https://www.youtube.com/embed/rFYDIZQB2Z0?si=-nmxogktS2QoAQyN" frameborder="10" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</div>

<div class="download-menu">
  <button class="download-button">Video 1 Button 1</button>
  <button class="download-button">Video 1 Button 2</button>
  <button class="download-button">Video 1 Button 3</button>
</div>

<div class="video-container">
  <iframe width="530" height="300" src="https://www.youtube.com/embed/VIDEO_ID_2" frameborder="10" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</div>

<div class="download-menu">
  <button class="download-button">Video 2 Button 1</button>
  <button class="download-button">Video 2 Button 2</button>
  <button class="download-button">Video 2 Button 3</button>
</div>

<!-- Repeat this structure for additional videos -->

</body>
</html>
